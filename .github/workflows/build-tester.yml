name: Traffic-1

on:
  workflow_dispatch:

jobs:
  run-traffic:
    runs-on: ubuntu-latest
    env:
      DISPLAY: ':99.0'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Xvfb (Simulate GUI)
        run: Xvfb :99 -screen 0 1920x1080x24 &

      - name: Install Playwright with Firefox
        run: |
          npm install playwright
          npx playwright install firefox

      - name: Display Current IP
        run: curl https://api.ipify.org

      - name: Run Main Script in Loop Until Timeout
        run: |
          echo "Starting loop to run main.js repeatedly for up to 10 minutes..."
          START_TIME=$(date +%s)
          TIMEOUT=$((60 * 10)) # 10 minutes in seconds

          while true; do
            echo "Running main.js..."
            node main.js || echo "main.js exited with non-zero, continuing..."
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "Reached 10 minutes. Triggering workflow rerun..."
              break
            fi
            echo "Sleeping 20 seconds before next run..."
            sleep 20
          done

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: page-screenshots
          path: |
            screenshot1.png
            screenshot2.png

      - name: Re-trigger This Workflow
        run: |
          echo "Re-triggering this workflow..."
          curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/Traffic-1.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
